<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Roshan's Proposal | Availability</title>
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
  <div class="gradient-bg"></div><div class="sparkle-layer"></div>
  <main class="app-shell">
    <nav class="topbar">
      <a class="brand" href="index.html"><span class="brand-orb"></span><span>Roshan's</span></a>
      <div class="nav-links"><a href="index.html">Home</a><a href="cuisine.html">Our Date</a><a class="active" href="availability.html">Availability</a><a href="review.html">Review</a></div>
      <span class="music-pill">♫</span>
    </nav>

    <section class="glass-card">
      <div class="clouds"></div>
      <div class="page-grid">
        <div class="page-copy">
          <p class="eyebrow">Availability</p>
          <h1>When are you free, beautiful?</h1>
          <p class="subtitle">Pick a date and time that works best for you.</p>
          <img class="mini-chibi mini-angel" src="assets/img/chibi/angel.png" alt="Angel chibi" />
          <div class="small-card">I’ll make sure everything is perfect! ♡</div>
        </div>
        <div class="form-card">
          <div class="field"><label class="field-label" for="dateInput">Select a Date</label><input class="input" id="dateInput" type="date" /></div>
          <div class="field"><label class="field-label" for="timeInput">Select a Time</label><input class="input" id="timeInput" type="time" /></div>
          <div class="field"><label class="field-label" for="noteInput">Add a Note Optional</label><textarea class="input" id="noteInput" placeholder="Anything you’d like me to know?"></textarea></div>
          <p class="status" id="statusText"></p>
          <div class="action-row"><a class="btn btn-ghost" href="cuisine.html">Back</a><button id="toReview" class="btn btn-primary" type="button">Looks Perfect! ✨</button></div>
        </div>
        <div class="side-deco"><img class="mini-chibi mini-dessert" src="assets/img/chibi/dessert.png" alt="Chibi with dessert" /></div>
      </div>
    </section>
  </main>
  <script src="config.js"></script><script src="assets/js/app.js"></script>
</body>
</html>
