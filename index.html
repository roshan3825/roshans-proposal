<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Roshan's Proposal</title>
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
  <div class="gradient-bg"></div><div class="sparkle-layer"></div>
  <main class="app-shell">
    <nav class="topbar">
      <a class="brand" href="index.html"><span class="brand-orb"></span><span>Roshan's</span></a>
      <div class="nav-links"><a class="active" href="index.html">Home</a><a href="cuisine.html">Our Date</a><a href="availability.html">Availability</a><a href="review.html">Review</a></div>
      <span class="music-pill">♫</span>
    </nav>

    <section class="glass-card hero-card">
      <div class="clouds"></div>
      <div class="hero-visual">
        <img class="main-chibi" src="assets/img/chibi/heart_stand.png" alt="Animated Roshan holding a heart" />
      </div>
      <div class="hero-copy">
        <p class="eyebrow">A little question</p>
        <h1 class="script-title">Roshan's <span>Proposal</span></h1>
        <p class="question">Would you want to go<br />on a date with me?</p>
        <div class="button-row">
          <button id="yesBtn" class="btn btn-primary" type="button">Yes! ♥</button>
          <button id="noBtn" class="btn btn-ghost" type="button">No 🙈</button>
        </div>
        <p class="hint">Hover over “No” and see what happens.</p>
      </div>
      <img class="mini-chibi mini-heart" src="assets/img/chibi/heart_hug.png" alt="Mini chibi hugging heart" />
    </section>
  </main>
  <script src="config.js"></script>
  <script src="assets/js/app.js"></script>

</html>
